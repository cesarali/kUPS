# Resolved numeric representation of the Moltemplate-generated LAMMPS methane
# case. This is closer to the source simulation than methane_lj_only_nve.yaml,
# but no current kUPS application consumes this file directly.

source:
  directory: external/lammps_oplss/moltemplate_oplsaa_tiny
  lammps_run_file: run.in.tiny
  data_file: system.data
  init_file: system.in.init
  settings_file: system.in.settings
  charges_file: system.in.charges

lammps_semantics:
  units: real
  atom_style: full
  bond_style: harmonic
  angle_style: harmonic
  dihedral_style: opls
  improper_style: cvff
  pair_style: lj/charmm/coul/long
  pair_style_args: [9.0, 11.0]
  pair_modify:
    mix: geometric
  special_bonds:
    lj: [0.0, 0.0, 0.5]
    coul: [0.0, 0.0, 0.5]
  kspace_style:
    name: pppm
    accuracy: 0.0001

box:
  xlo: -15.0
  xhi: 15.0
  ylo: -15.0
  yhi: 15.0
  zlo: -15.0
  zhi: 15.0
  pbc: [true, true, true]

atom_types:
  1:
    label: C_opls_138
    element: C
    mass_amu: 12.011
    charge_e: -0.24
    lj:
      epsilon_kcal_per_mol: 0.060
      epsilon_eV: 0.0026018469
      sigma_angstrom: 3.570
  2:
    label: H_opls_140
    element: H
    mass_amu: 1.008
    charge_e: 0.06
    lj:
      epsilon_kcal_per_mol: 0.030
      epsilon_eV: 0.00130092345
      sigma_angstrom: 2.500

atoms:
  - {id: 1, molecule: 1, type: 1, element: C, charge_e: -0.24, position_angstrom: [0.0, 0.0, 0.0]}
  - {id: 2, molecule: 1, type: 2, element: H, charge_e: 0.06, position_angstrom: [0.0, 0.0, 1.089]}
  - {id: 3, molecule: 1, type: 2, element: H, charge_e: 0.06, position_angstrom: [1.026719, 0.0, -0.363]}
  - {id: 4, molecule: 1, type: 2, element: H, charge_e: 0.06, position_angstrom: [-0.51336, -0.889165, -0.363]}
  - {id: 5, molecule: 1, type: 2, element: H, charge_e: 0.06, position_angstrom: [-0.51336, 0.889165, -0.363]}

bond_types:
  1:
    style: harmonic
    k_kcal_per_mol_per_angstrom2: 340.0
    k_eV_per_angstrom2: 14.7437858
    r0_angstrom: 1.09

bonds:
  - {id: 1, type: 1, atoms: [1, 2]}
  - {id: 2, type: 1, atoms: [1, 3]}
  - {id: 3, type: 1, atoms: [1, 4]}
  - {id: 4, type: 1, atoms: [1, 5]}

angle_types:
  1:
    style: harmonic
    k_lammps_kcal_per_mol_per_rad2: 33.0
    k_eV_per_rad2: 1.4310158
    # kUPS' current harmonic_angle_energy computes angle deviations in degrees,
    # so an importer would need this converted coefficient if it used that
    # implementation as-is.
    k_eV_per_degree2_for_current_kups_harmonic: 0.000435899
    theta0_degree: 107.8

angles:
  - {id: 1, type: 1, atoms: [2, 1, 3]}
  - {id: 2, type: 1, atoms: [2, 1, 4]}
  - {id: 3, type: 1, atoms: [2, 1, 5]}
  - {id: 4, type: 1, atoms: [3, 1, 4]}
  - {id: 5, type: 1, atoms: [3, 1, 5]}
  - {id: 6, type: 1, atoms: [4, 1, 5]}

run_protocol:
  minimization:
    etol: 1.0e-6
    ftol: 1.0e-8
    maxiter: 200
    maxeval: 1000
  velocity_create:
    temperature_K: 50.0
    seed: 12345
    mom: true
    rot: true
    distribution: gaussian
  md:
    ensemble: nve
    timestep_fs: 0.25
    steps: 10
