name: GPU Validation
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: t4-gpu-github
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Nvidia smi
        run: nvidia-smi
      - name: Run statistical validation
        run: uv run --no-default-groups --group cuda python validate.py
        working-directory: ci/statistical
      - name: Compare LAMMPS YAML references
        run: uv run --no-default-groups --group cuda python lammps/validate.py
        working-directory: ci/statistical
      - name: Validate NVE ensemble
        run: uv run --no-default-groups --group cuda python validate_nve_physics.py
        working-directory: ci/statistical
      - name: Validate NVT ensemble
        run: uv run --no-default-groups --group cuda python validate_nvt_physics.py
        working-directory: ci/statistical
      - name: Validate NPT ensemble (CSVR-NPT)
        run: uv run --no-default-groups --group cuda python validate_npt_physics.py
        working-directory: ci/statistical
      - name: Validate NPT ensemble (BAOAB-NPT-Langevin)
        run: uv run --no-default-groups --group cuda python validate_npt_physics.py md_npt_lj_argon_baoab.h5
        working-directory: ci/statistical
      - name: MACE torch-bridge e2e
        # Random ``ScaleShiftMACE`` checkpoint built at test time, so no
        # external download is needed. The test file self-skips via
        # ``pytest.importorskip`` when the ``mace`` extra isn't installed.
        run: uv run --no-default-groups --group dev --group cuda --extra mace pytest test/potential/test_torch_mace_e2e.py
      - name: UMA torch-bridge e2e
        # ``uma`` and ``mace`` extras conflict (see pyproject.toml), so this
        # runs in a separate ``uv run`` invocation with a fresh resolution.
        run: uv run --no-default-groups --group dev --group cuda --extra uma pytest test/potential/test_torch_uma_e2e.py
